<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northshore Gardens — Checkout Canceled</title>
  <meta name="description" content="Your checkout was canceled." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/final-cta-footer.css" />
  <link rel="stylesheet" href="../css/checkout.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body class="checkout-page">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="./index.html" aria-label="Northshore Gardens home">
        <img src="../assets/brand/logo.png" alt="Northshore Gardens logo" />
      </a>
      <nav class="site-nav">
        <a href="./index.html#gallery">Gallery</a>
        <a href="./index.html#how-it-works">How It Works</a>
        <a href="./index.html#difference">Why Us</a>
        <a href="./index.html#packages">Packages</a>
      </nav>
    </div>
  </header>

  <main class="checkout-shell">
    <div class="container">
      <article class="checkout-card reveal">
        <p class="eyebrow">Checkout canceled</p>
        <h1>No problem. Your selection was not charged.</h1>
        <p class="checkout-copy">
          You can return to plan selection any time and continue when you are ready.
        </p>
        <div class="checkout-actions">
          <a class="button" id="returnToPlans" href="./plans.html">Back to plans</a>
          <a class="button button-secondary" href="./contact.html">Contact us</a>
        </div>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <img class="footer-logo" src="../assets/brand/logo.png" alt="Northshore Gardens logo" />
      <p>Landscape Design · North Shore, Illinois · Zone 5b</p>
      <a href="mailto:hello@northshoregardens.studio">hello@northshoregardens.studio</a>
    </div>
  </footer>

  <script src="../js/app-config.js"></script>
  <script src="../js/main.js"></script>
  <script>
    (function () {
      var lead = "";
      try {
        var params = new URLSearchParams(window.location.search || "");
        lead = (params.get("lead") || "").trim();
      } catch (_err) {}
      var link = document.getElementById("returnToPlans");
      if (link && lead) {
        link.setAttribute("href", "./plans.html?lead=" + encodeURIComponent(lead));
      }
    })();
  </script>
</body>
</html>
