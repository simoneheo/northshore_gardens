how_it_works:
  eyebrow: "The Process"
  title: "How It Works"

  subtext: >
    Landscape design that fits your schedule, your budget,
    and your ambition — without ever needing a contractor.

  steps:
    - number: "1"
      title: "Choose your package & check out"
      body: >
        Select Standard or Large Lot based on your front yard.
        Complete a simple, secure checkout. Packages start at $59.99 —
        no hidden fees, no installation markup.

    - number: "2"
      title: "Receive your design questionnaire"
      intro: >
        Within 24 hours of purchase, you'll receive a link
        to our intake form. We'll ask for:

      checklist:
        - kind: "check"
          text: "3–5 photos of your current front yard"

        - kind: "check"
          text: "Your plant budget (for the nursery run)"

        - kind: "check"
          text: "Trees or shrubs you'd like to keep"

        - kind: "check"
          text: "Style preferences and inspiration images"

        - kind: "optional"
          text: "Plat of survey"
          note: "optional — helps with accuracy"

        - kind: "optional"
          text: "Rough yard measurements"
          note: "optional"

    - number: "3"
      title: "We design your yard"
      body: >
        Our designer — with deep knowledge of North Shore properties,
        local microclimates, and Zone 5b plants — creates a custom plan
        for your specific home. Not a template. Not AI-generated.
        A real, considered design.

    - number: "4"
      title: "Receive your design package"
      body: >
        Within 10 days, you'll receive a polished PDF — planting diagram,
        full plant list, estimated plant budget, and step-by-step
        installation guidance. Take it to any local nursery and get planting.

      callout:
        strong: "No revisions to schedule. No site visits. No contractor pressure."
        subtext: "Just a beautiful plan, delivered to your inbox."


