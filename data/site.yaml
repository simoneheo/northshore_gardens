about:
  eyebrow: "Our Story"

  title_html: >
    Designed for the <em>North Shore</em>, by someone who lives here.

  paragraphs:
    - >
      Northshore Gardens was born out of a frustration with online
      landscape design that feels generic — templates built for California climates,
      plant lists that don't survive an Illinois winter, designs with no sense
      of the neighborhood they're meant to serve.

    - >
      We're different because we're local. We know what thrives in Zone 5b.
      We know the character of Wilmette streetscapes, the scale of a typical
      Winnetka front yard, and which plants your neighbors have been successfully
      growing for decades.

    - >
      And we built this service for the homeowner who wants a real design —
      not a contractor pitch. You hire your own people, or you plant it yourself.
      Either way, you get a plan that actually works.

  pillars:
    - title: "Rooted in the North Shore"
      body: >
        Every design is created with deep familiarity of local neighborhoods,
        tree canopies, soil conditions, and the visual language of homes
        from Evanston to Lake Forest.

    - title: "Zone 5b first, always"
      body: >
        We never specify a plant that won't survive your winter.
        Every selection is battle-tested for the Chicago North Shore climate —
        no beautiful-in-California casualties.

    - title: "No installation upsell"
      body: >
        We don't have a landscaping crew to sell you. Our only incentive
        is giving you a plan that's genuinely easy to execute —
        whether you're hiring out or doing it yourself.

    - title: "Affordable by design"
      body: >
        Professional landscape design shouldn't cost thousands before a single
        plant goes in the ground. We keep our packages accessible so the design
        doesn't become the barrier.


