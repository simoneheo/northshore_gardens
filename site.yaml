hero:
  eyebrow: Thinking about your yard?
  title: A better yard starts with a few photos
  subtext: Answer quick questions about what you're thinking. We'll share initial ideas tailored to your vision.
  cta:
    primary: Get Started
    secondary: View Examples
    tertiary: Packages
    microcopy: Free to start. Upgrade to a professional plan anytime.
  points:
    - Flat-fee design
    - Locally based
    - <7days delivery

contact:
  title: Tell us what you're thinking about.
  body: Send a description or photos of your yard. Our designers will take a look and reach out. 
  trust: No sales pressure. No spam.
  form:
    message_label: Message
    email_label: Email
    upload_label: Add a photo (optional)
    submit_label: Send Message
  success:
    title: Thank you! We'll get back to you as soon as possible.
    body: Photos help us give more specific ideas. Feel free to send more details anytime.

gallery:
  title: Elevated curb appeal
  intro: Small changes can transform how your home feels. 

how_it_works:
  eyebrow: How It Works
  title: Simple from start to finish.
  intro: Work directly with a designer from the get-go. We keep it personal and low-pressure.
  steps:
    - title: Share your yard
      body: Answer a few questions and upload photos of your space.
    - title: Get ideas 
      body: We review your space and reply with initial concepts. 
    - title: Move forward
      body: Purchase a professional plan if it feels right. If not, keep the ideas.
    - title: Build design
      body: Use it with a contractor or DIY. We help coordinate with a trusted installer if needed.

why_this_is_different:
  eyebrow: Why We Are Different
  title: Focused on Design
  body: Traditional landscaping is driven by installation incentives. We take a different approach. We create tailored yard plans with no inflated scope.
  items:
    - title: Design-first approach
      body: No installation incentives. Just a complete plan aligned with your vision and budget.

    - title: Flat-fee and simple
      body: Clear pricing with no price creep and no pressure to expand.

    - title: Local to the Northshore
      body: Designed around Midwestern conditions and plants available at local nurseries.

    - title: Personal touch
      body: Work directly with a designer who responds with ideas tailored to your yard.

    - title: Fast turnaround
      body: Receive a detailed professional plan in under 7 days.

# Package prices: edit pricing.json at repo root, then run python3 build_site.py (Stripe uses the same file).
packages:
  eyebrow: Packages
  title: Every design is by a local designer. 
  intro: Start with a consultation. Choose a plan when you're ready to move forward.
  cta: Get Consultation
  signature:
    label: Most homeowners choose this
    title: Signature Plan
    subtitle: A complete, build-ready plan for your yard.
    items:
      - Custom design tailored to your home
      - Top-view layout with plant names
      - Plant quantities and specifications
      - Plant sheet with bloom season, color palette, and sun info
      - Delivered within 7 days
      - "Optional: coordination with a trusted contractor"
    note: Everything for contractors or DIYers.
  premium:
    label: For more guidance
    title: Premium Plan
    subtitle: Everything in Signature, with added support.
    items:
      - Everything in Signature Plan
      - 1 revision
      - Plant substitutions
      - Installation guidelines
      - Phasing suggestions
      - Nursery budget sheet
    note: Best for more flexibility or building in phases.

