contact:
  title: Tell us what you're thinking about.
  body: It helps if you send a description or photos of your yard. Our designers will take a look and reach out. 
  trust: No sales pressure. No spam.
  form:
    message_label: Message
    email_label: Email
    upload_label: Add a photo (optional)
    submit_label: Send Message
  success:
    title: Thank you! We'll get back to you as soon as possible.

gallery:
  title: Front yard designs
  intro: Durable plantings, shaped by Northshore character

how_it_works:
  eyebrow: How It Works
  title: Simple from start to finish.
  intro: Work directly with a designer from the get-go. We keep it personal and low-pressure.
  steps:
    - title: Share your yard
      body: Tell us about your yard and what you have in mind. 
    - title: Get ideas 
      body: We review your space and reply with initial concepts. 
    - title: Move forward
      body: Purchase a professional plan if it feels right. If not, keep the ideas.
    - title: Build design
      body: We help coordinate with a trusted installer. You can also work with your own contractor or DIY.

why_this_is_different:
  eyebrow: Why We Are Different
  title: Focused on Design
  body: Traditional design-build firms are driven by installation incentives. We take a different approach. We create personalized yard plans, sized to your space and your goals.
  items:
    - title: Design-first approach
      body: No construction incentives, no inflated scope. Just a plan aligned with your vision and budget.

    - title: Flat-fee and simple
      body: Clear pricing with no price creep and no pressure to expand.

    - title: Local to the Northshore
      body: Designed to be built, with Midwest conditions and local guidelines in mind.

    - title: Personal touch
      body: A designer works with you from first idea to final plan.

    - title: Fast turnaround
      body: Receive a detailed professional plan in under 7 days, ready to build.

# Package prices: edit pricing.json at repo root, then run python3 build_site.py (Stripe uses the same file).
packages:
  eyebrow: Packages
  title: Work directly with a designer from start to finish.
  intro: Start with a free consultation. Choose a plan when you're ready to move forward.
  cta: Get Consultation
  signature:
    label: Most homeowners choose this
    title: Signature Plan
    subtitle: A complete, build-ready plan for your yard.
    items:
      - Custom design tailored to your home
      - Professional top-view layout 
      - Detailed plant specifications
      - Delivered within 7 days
      - "Optional: coordination with a trusted contractor"
  premium:
    label: For more guidance and flexibility
    title: Premium Plan
    subtitle: Everything in Signature, with added support.
    items:
      - Everything in Signature Plan
      - 1 revision
      - Plant substitutions
      - Installation guidelines
      - Phasing suggestions
      - Nursery budget sheet
    note: Best for DIYers or building in phases.

