contact:
  title: Tell us what you're thinking about for your yard.
  body: Send a description or photos of your space. Our designers will take a look and reach out with thoughtful suggestions. 
  trust: No sales pressure. No spam.
  form:
    message_label: Message
    email_label: Email
    upload_label: Add a photo (optional)
    submit_label: Send Message
  success:
    title: Thank you! We'll get back to you as soon as possible.
    body: Photos help us give more specific ideas. Feel free to send more details anytime.

gallery:
  title: Elevated curb appeal.
  intro: Small, intentional changes can transform how your home feels. 

how_it_works:
  eyebrow: How It Works
  title: Simple from start to finish.
  intro: You work directly with a designer from the start, keeping the process personal and low-pressure.
  steps:
    - title: Share a few details about your yard
      body: Answer a couple questions and upload photos of your yard.
    - title: Hear back from a designer
      body: We review your space and reach out with ideas tailored to your yard.
    - title: Move forward if it feels right
      body: If you choose to continue, you can purchase a professional plan. If not, you still leave with ideas.
    - title: Apply your design
      body: You receive a buildable plan you can hand off to a contractor or build yourself. We help you coordinate with a trusted installer, if needed. 
  
why_this_is_different:
  eyebrow: Why This Is Different
  title: Focused on Design
  body: Traditional landscaping is driven by installation incentives. We take a different approach. Based in Northbrook, IL, we create tailored yard plans with no inflated scope. A refined design service you can hand off to a contractor or build yourself, with complimentary coordination if requested.
  items:
    - title: Design-first approach
      body: No installation incentives. Just a complete plan aligned with your vision and budget.

    - title: Flat-fee and simple
      body: Clear pricing with no price creep and no pressure to expand.

    - title: Local to the Northshore
      body: Designed around Midwestern conditions and plants available at local nurseries.

    - title: Personal touch
      body: Work directly with a designer who responds with ideas tailored to your yard.

    - title: Fast turnaround
      body: Receive a detailed professional plan in under 7 days.

packages:
  eyebrow: Packages
  title: Every design is created by a local expert. No templates or algorithms.
  intro: Start with a quick consultation. Choose a plan when you're ready to move forward.
  signature:
    label: Most homeowners choose this
    title: Signature Plan
    subtitle: A complete, build-ready design for your yard.
    items:
      - Custom design tailored to your home
      - Top-view layout with plant names
      - Plant quantities and specifications
      - Plant sheet with bloom season, color palette, and sun info
      - Delivered within 7 days
      - "Optional: coordination with a trusted contractor"
    note: Everything you need to move forward with clarity, whether you're working with a contractor or building it yourself.
  premium:
    label: For more guidance
    title: Premium Plan
    subtitle: Everything in Signature, with added clarity and flexibility.
    items:
      - Everything in Signature Plan
      - 1 revision
      - Plant substitutions
      - Installation guidelines
      - Phasing suggestions
      - Nursery budget sheet
    note: Best if you want more flexibility or plan to build in stages.

